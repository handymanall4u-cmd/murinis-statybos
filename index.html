<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mūrinio namo statybos</title>

<style>
:root{
  --bg:#0b1118;
  --card:#121a24;
  --line:#1f2a38;
  --text:#e8eefc;
  --muted:#9fb0c7;
  --accent:#4da3ff;
  --ok:#4caf50;
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{margin:0;background:var(--bg);color:var(--text)}
header{padding:16px;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:18px}
main{padding:16px;display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:8px 12px;border:1px solid var(--line);border-radius:999px;cursor:pointer}
.tab.active{border-color:var(--accent)}
.row{display:flex;gap:8px;flex-wrap:wrap}
input,select,textarea,button{
  background:#0e1622;color:var(--text);
  border:1px solid var(--line);border-radius:8px;
  padding:8px
}
button.primary{background:var(--accent);border-color:var(--accent);color:#000}
button.ok{background:var(--ok);border-color:var(--ok);color:#000}
small{color:var(--muted)}
.list{display:grid;gap:8px}
.item{padding:8px;border:1px solid var(--line);border-radius:8px}
.hidden{display:none}
a{color:var(--accent)}
</style>
</head>

<body>
<header>
  <h1>🏠 Mūrinio namo statybų valdymas</h1>
</header>

<main>
  <div class="tabs">
    <div class="tab active" onclick="showTab('overview')">Apžvalga</div>
    <div class="tab" onclick="showTab('budget')">Biudžetas</div>
    <div class="tab" onclick="showTab('docs')">Dokumentai</div>
  </div>

  <!-- APŽVALGA -->
  <div id="overview" class="card">
    <h3>Projektas</h3>
    <div class="row">
      <input id="projectName" placeholder="Projekto pavadinimas">
      <button class="ok" onclick="saveProject()">Išsaugoti</button>
    </div>
    <small id="projectInfo"></small>
  </div>

  <!-- BIUDŽETAS -->
  <div id="budget" class="card hidden">
    <h3>Išlaidos</h3>
    <div class="row">
      <input id="expTitle" placeholder="Pavadinimas">
      <input id="expAmount" type="number" placeholder="Suma €">
      <button class="primary" onclick="addExpense()">Pridėti</button>
    </div>
    <div id="expenseList" class="list"></div>
    <h4 id="total"></h4>
  </div>

  <!-- DOKUMENTAI -->
  <div id="docs" class="card hidden">
    <h3>Čekiai / Sąskaitos faktūros</h3>
    <input type="file" id="fileInput" accept="image/*,application/pdf">
    <button class="primary" onclick="saveFile()">Įkelti dokumentą</button>
    <small>Failai saugomi lokaliai (telefone / kompiuteryje)</small>
    <div id="fileList" class="list"></div>
  </div>
</main>

<script>
/* --- TABS --- */
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'))
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active')
  document.getElementById(id).classList.remove('hidden')
}

/* --- PROJECT --- */
function saveProject(){
  const name=document.getElementById('projectName').value
  localStorage.setItem('projectName',name)
  renderProject()
}
function renderProject(){
  const n=localStorage.getItem('projectName')||'—'
  document.getElementById('projectInfo').innerText='Pavadinimas: '+n
}
renderProject()

/* --- BUDGET --- */
let expenses=JSON.parse(localStorage.getItem('expenses')||'[]')
function addExpense(){
  expenses.push({
    title:expTitle.value,
    amount:parseFloat(expAmount.value||0)
  })
  localStorage.setItem('expenses',JSON.stringify(expenses))
  expTitle.value='';expAmount.value=''
  renderExpenses()
}
function renderExpenses(){
  const el=document.getElementById('expenseList')
  el.innerHTML=''
  let sum=0
  expenses.forEach(e=>{
    sum+=e.amount
    el.innerHTML+=`<div class="item">${e.title} – ${e.amount.toFixed(2)} €</div>`
  })
  document.getElementById('total').innerText='Iš viso: '+sum.toFixed(2)+' €'
}
renderExpenses()

/* --- FILE STORAGE (IndexedDB) --- */
let db
const req=indexedDB.open('docsDB',1)
req.onupgradeneeded=e=>{
  db=e.target.result
  db.createObjectStore('files',{keyPath:'id',autoIncrement:true})
}
req.onsuccess=e=>{
  db=e.target.result
  loadFiles()
}

function saveFile(){
  const f=document.getElementById('fileInput').files[0]
  if(!f)return alert('Pasirink failą')
  const tx=db.transaction('files','readwrite')
  tx.objectStore('files').add({
    name:f.name,
    type:f.type,
    data:f
  })
  tx.oncomplete=loadFiles
}

function loadFiles(){
  const list=document.getElementById('fileList')
  list.innerHTML=''
  const tx=db.transaction('files','readonly')
  const store=tx.objectStore('files')
  store.openCursor().onsuccess=e=>{
    const c=e.target.result
    if(c){
      const d=c.value
      const url=URL.createObjectURL(d.data)
      list.innerHTML+=`
        <div class="item">
          ${d.name}
          <a href="${url}" target="_blank">Atidaryti</a>
        </div>`
      c.continue()
    }
  }
}
</script>
